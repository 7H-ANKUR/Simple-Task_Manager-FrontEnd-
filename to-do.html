<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Task Manager</title>
  <link rel="stylesheet" href="sttyle.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-top">
        <div>
          <h1>Advanced Task Manager</h1>
          <p>Organize work &amp; personal tasks with deadlines, priority and drag-and-drop.</p>
        </div>
        <button type="button" id="theme-toggle" class="secondary-button theme-toggle-button">Dark Mode</button>
      </div>
    </header>

    <main class="content-grid">
      <section class="task-panel">
        <div class="panel-card">
          <h2>New Task</h2>
          <form id="task-form" class="task-form">
            <label>
              Title
              <input id="task-title" type="text" placeholder="e.g. Review proposal" required />
            </label>

            <label>
              Category
              <select id="task-category" required>
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Errands">Errands</option>
              </select>
            </label>

            <label>
              Deadline
              <input id="task-deadline" type="date" required />
            </label>

            <label>
              Priority
              <select id="task-priority" required>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </label>

            <label>
              Description
              <textarea id="task-desc" rows="3" placeholder="Optional details..."></textarea>
            </label>

            <div class="form-actions">
              <button type="submit" class="primary-button">Add Task</button>
              <button type="button" id="clear-form" class="secondary-button">Clear</button>
            </div>
          </form>
        </div>

        <div class="panel-card summary-card">
          <h2>Task Summary</h2>
          <div class="summary-grid">
            <div class="summary-item">
              <span id="count-open">0</span>
              <small>Open</small>
            </div>
            <div class="summary-item">
              <span id="count-completed">0</span>
              <small>Completed</small>
            </div>
            <div class="summary-item">
              <span id="count-overdue">0</span>
              <small>Overdue</small>
            </div>
          </div>
        </div>
      </section>

      <section class="task-board">
        <div class="board-card">
          <header class="board-header">
            <h2>Open Tasks</h2>
            <p>Drag tasks to reorder them within the open task list.</p>
          </header>
          <div id="tasks-open" class="task-list" aria-label="Open tasks"></div>
        </div>

        <div class="board-card completed-board">
          <header class="board-header">
            <h2>Completed Tasks</h2>
            <p>Completed items appear here.</p>
          </header>
          <div id="tasks-completed" class="task-list completed-list" aria-label="Completed tasks"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="to-do.js"></script>
</body>
</html>
